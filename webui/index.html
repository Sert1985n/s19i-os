<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>S19i-OS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #111; color: #eee; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px; }
    .label { color: #aaa; font-size: 14px; }
    .value { font-size: 28px; margin-top: 6px; }
    a { color: #8ab4ff; }
  </style>
</head>
<body>
  <h1>S19i-OS</h1>
  <p><a href="firmware.html">System → Firmware</a></p>

  <div class="grid">
    <div class="card"><div class="label">Hashrate</div><div class="value" id="hashrate">--</div></div>
    <div class="card"><div class="label">Power</div><div class="value" id="power">--</div></div>
    <div class="card"><div class="label">BestShare</div><div class="value" id="bestShare">--</div></div>
    <div class="card"><div class="label">Blocks Found</div><div class="value" id="blocksFound">--</div></div>
  </div>

  <h2>Last Found Block</h2>
  <pre id="lastBlock">loading...</pre>

  <script>
    async function loadSummary() {
      const res = await fetch('/api/v1/summary');
      const data = await res.json();
      document.getElementById('hashrate').textContent = data.current_hashrate_ths + ' TH/s';
      document.getElementById('power').textContent = data.power_w + ' W';
      document.getElementById('bestShare').textContent = data.best_share;
      document.getElementById('blocksFound').textContent = data.blocks_found_total;
      document.getElementById('lastBlock').textContent = JSON.stringify(data.last_found_block, null, 2);
    }

    loadSummary();
  </script>
</body>
</html>
