<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>S19i-OS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:16px; }
    .card { background:#1b1b1b; border:1px solid #2a2a2a; border-radius:14px; padding:16px; }
    h1, h2 { margin:0 0 12px; }
    .value { font-size: 28px; font-weight: bold; }
    .muted { color:#aaa; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>S19i-OS</h1>
    <p class="muted">Каркас dashboard с метриками BestShare и FoundBlock.</p>
    <div class="grid">
      <div class="card"><h2>Hashrate</h2><div id="hashrate" class="value">--</div></div>
      <div class="card"><h2>Power</h2><div id="power" class="value">--</div></div>
      <div class="card"><h2>BestShare</h2><div id="bestshare" class="value">--</div></div>
      <div class="card"><h2>Blocks Found</h2><div id="blocks" class="value">--</div></div>
    </div>
    <div class="card" style="margin-top:16px">
      <h2>Last Found Block</h2>
      <pre id="lastblock">loading...</pre>
    </div>
  </div>
  <script>
    async function load() {
      const r = await fetch('/api/v1/summary');
      const s = await r.json();
      document.getElementById('hashrate').textContent = s.current_hashrate_ths + ' TH/s';
      document.getElementById('power').textContent = s.power_w + ' W';
      document.getElementById('bestshare').textContent = s.best_share;
      document.getElementById('blocks').textContent = s.blocks_found_total;
      document.getElementById('lastblock').textContent = JSON.stringify(s.last_found_block, null, 2);
    }
    load();
  </script>
</body>
</html>
