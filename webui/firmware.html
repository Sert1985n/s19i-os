<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>S19i-OS Firmware Update</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #111; color: #eee; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px; max-width: 800px; }
    button { padding: 10px 14px; margin-right: 8px; cursor: pointer; }
    pre { background: #0b0b0b; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Firmware Update</h1>
    <p>Загрузите пакет обновления для Antminer S19i.</p>

    <input type="file" id="fwfile">
    <div style="margin-top: 12px;">
      <button id="uploadBtn">Upload</button>
      <button id="applyBtn">Apply</button>
      <button id="refreshBtn">Refresh</button>
    </div>

    <h2>Status</h2>
    <pre id="status">loading...</pre>
  </div>

  <script>
    async function refreshStatus() {
      const res = await fetch('/api/v1/firmware/status');
      const data = await res.json();
      document.getElementById('status').textContent = JSON.stringify(data, null, 2);
    }

    async function uploadFirmware() {
      const fileInput = document.getElementById('fwfile');
      if (!fileInput.files.length) {
        alert('Выберите файл обновления');
        return;
      }
      const fd = new FormData();
      fd.append('file', fileInput.files[0]);
      const res = await fetch('/api/v1/firmware/upload', {
        method: 'POST',
        body: fd
      });
      const data = await res.json();
      document.getElementById('status').textContent = JSON.stringify(data, null, 2);
    }

    async function applyFirmware() {
      const res = await fetch('/api/v1/firmware/apply', { method: 'POST' });
      const data = await res.json();
      document.getElementById('status').textContent = JSON.stringify(data, null, 2);
    }

    document.getElementById('uploadBtn').addEventListener('click', uploadFirmware);
    document.getElementById('applyBtn').addEventListener('click', applyFirmware);
    document.getElementById('refreshBtn').addEventListener('click', refreshStatus);

    refreshStatus();
  </script>
</body>
</html>
