<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>S19i-OS Firmware Update</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background:#1b1b1b; border:1px solid #2a2a2a; border-radius:14px; padding:16px; margin-bottom:16px; }
    button { padding:10px 14px; border-radius:10px; border:0; cursor:pointer; }
    input[type=file] { margin: 12px 0; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Firmware Update</h1>
    <div class="card">
      <h2>Upload package</h2>
      <input id="pkg" type="file" />
      <div>
        <button onclick="uploadPkg()">Upload</button>
        <button onclick="applyPkg()">Apply</button>
        <button onclick="refreshStatus()">Refresh</button>
      </div>
    </div>
    <div class="card">
      <h2>Status</h2>
      <pre id="status">loading...</pre>
    </div>
  </div>
  <script>
    async function refreshStatus() {
      const r = await fetch('/api/v1/firmware/status');
      document.getElementById('status').textContent = JSON.stringify(await r.json(), null, 2);
    }
    async function uploadPkg() {
      const input = document.getElementById('pkg');
      if (!input.files.length) return alert('Выберите файл');
      const form = new FormData();
      form.append('file', input.files[0]);
      const r = await fetch('/api/v1/firmware/upload', { method: 'POST', body: form });
      document.getElementById('status').textContent = JSON.stringify(await r.json(), null, 2);
    }
    async function applyPkg() {
      const r = await fetch('/api/v1/firmware/apply', { method: 'POST' });
      document.getElementById('status').textContent = JSON.stringify(await r.json(), null, 2);
    }
    refreshStatus();
  </script>
</body>
</html>
